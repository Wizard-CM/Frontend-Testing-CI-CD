name: CI

# When does this workflow run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - uses: actions/checkout@v4

      # 2. Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - run: npm ci

      # 4. Lint the code
      - run: npm run lint

      # 5. Run tests
      - run: npm test -- --run

      # 6. Build the app (catches type errors & build issues)
      - run: npm run build
